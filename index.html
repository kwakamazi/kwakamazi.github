<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stephen Sungkyu Kwak - Digital Card</title>
    <style>
        :root {
            --bg-color: #0a192f;
            --accent-color: #172a45;
            --text-color: #ffffff;
            --glass-bg: rgba(23, 42, 69, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-color), #020c1b);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
            transition: background 0.5s ease;
        }

        /* Glassmorphic Container */
        .card-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .info-list {
            list-style: none;
            margin-bottom: 30px;
            text-align: left;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            margin-bottom: 4px;
        }

        .info-value a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1rem;
            word-break: break-all;
            transition: opacity 0.2s;
        }

        .info-value a:hover {
            opacity: 0.8;
        }

        /* AI Trigger Button */
        .ai-btn {
            background: #ffffff;
            color: #020c1b;
            border: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ai-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 255, 255, 0.25);
        }

        .ai-btn:active {
            transform: translateY(0);
        }

        /* Color Picker Controls */
        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 10px 15px;
            border-radius: 50px;
        }

        .controls label {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .color-picker {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 30px;
            height: 30px;
            background: transparent;
            border: none;
            cursor: pointer;
        }
